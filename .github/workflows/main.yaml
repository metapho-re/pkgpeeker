name: Build and deploy to AWS S3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Select Node version
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx vitest run
      - name: Run linter
        run: npm run lint
      - name: Run style linter
        run: npm run stylelint
      - name: Run type checker
        run: npm run type-check
      - name: Build project
        run: npm run build
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3
      - name: Deploy to S3 and invalidate CloudFront
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws s3 sync dist s3://${{ secrets.AWS_S3_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --path "/*"
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_WWW_DISTRIBUTION_ID }} --path "/*"
